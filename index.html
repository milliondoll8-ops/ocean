<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN INFINITY | Mobile Ready</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #3b82f6; --dark: #020617; }
        body { background: var(--dark); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .font-crypto { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, button { -webkit-appearance: none; border-radius: 0.75rem; }
        .active-id { color: #60a5fa !important; text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body>

    <nav class="max-w-6xl mx-auto p-4 flex justify-between items-center">
        <div class="text-xl font-crypto font-bold tracking-tighter text-blue-500">OCEAN INFINITY</div>
        <div class="flex items-center gap-2">
            <select id="langSelect" onchange="changeLang(this.value)" class="bg-slate-800 border-none rounded-lg px-2 py-1 text-xs outline-none text-white">
                <option value="ru">RU</option>
                <option value="en">EN</option>
            </select>
            <button id="connectBtn" onclick="connect()" class="bg-blue-600 px-4 py-2 rounded-full font-bold text-[10px] uppercase transition-all text-white">Connect</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-4">
        <div class="text-center mb-8">
            <h1 id="t-hero" class="text-3xl font-crypto font-bold mb-2 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent uppercase">OCEAN AI</h1>
            <p id="t-quote" class="text-slate-400 text-[10px] italic leading-relaxed">"Математическая неизбежность успеха"</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass p-4 rounded-2xl text-center">
                <p id="t-id" class="text-[9px] text-slate-500 uppercase mb-1 font-crypto">ID</p>
                <div id="u-id" class="text-sm font-crypto font-bold active-id">--</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <p id="t-lvl" class="text-[9px] text-slate-500 uppercase mb-1 font-crypto">Level</p>
                <div id="u-level" class="text-sm font-crypto font-bold active-id">--</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <p id="t-ref" class="text-[9px] text-slate-500 uppercase mb-1 font-crypto">Ref</p>
                <div id="u-refs" class="text-sm font-crypto font-bold active-id">0</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-green-500/20">
                <p class="text-[9px] text-green-500 uppercase mb-1 font-bold">USDT</p>
                <div id="u-bal" class="text-sm font-crypto font-bold text-green-400">0.00</div>
            </div>
        </div>

        <div id="refLinkBox" class="hidden mb-6">
            <button onclick="copyRefLink()" class="w-full glass p-4 rounded-2xl border border-blue-500/40 flex justify-center items-center gap-3 text-blue-400">
                <span id="t-copy" class="text-[10px] font-bold uppercase tracking-widest">Копировать ссылку</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" /></svg>
            </button>
        </div>

        <div class="space-y-4">
            <div class="glass p-6 rounded-3xl">
                <h2 id="t-reg-title" class="text-lg font-bold mb-4">Регистрация</h2>
                <input id="refInput" type="text" placeholder="Referrer 0x..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 font-mono text-xs text-blue-300">
                <button onclick="register()" class="w-full bg-blue-600 py-4 rounded-xl font-bold text-sm uppercase tracking-tighter">
                    <span id="t-reg-btn">Вступить (10 USDT)</span>
                </button>
            </div>

            <div class="glass p-6 rounded-3xl">
                <h2 id="t-upg-title" class="text-lg font-bold mb-2">Повышение</h2>
                <p id="t-upg-desc" class="text-slate-400 text-[10px] mb-4">Открыть доход до 15 линий.</p>
                <button onclick="buyLevel()" class="w-full border-2 border-blue-600 py-4 rounded-xl font-bold text-sm uppercase">
                    <span id="t-upg-btn">Купить Уровень</span>
                </button>
            </div>
        </div>

        <div id="founderPanel" class="hidden mt-8 glass border-yellow-500/40 p-6 rounded-3xl text-center">
            <button onclick="withdrawPool()" class="bg-yellow-600 text-black w-full py-3 rounded-xl font-bold text-xs uppercase">Withdraw Pool</button>
        </div>
    </main>

    <script>
        const CONTRACT_ADDR = "0x2Edf764970BFa32Bfd6e0799682026814BcDF24B"; 
        const MY_WALLET = "0x9f1053B119D1565e641d0694C3c16c6Bfe644DA7";
        const USDT_ADDR = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F"; 

        const ABI = [
            "function register(address _referrer) external",
            "function buyLevel(uint8 _level) external",
            "function users(address) view returns (uint256 id, address referrer, uint8 activeLevel, uint256 personalReferralsCount)",
            "function owner() view returns (address)",
            "function withdrawLeaderPool() external",
            "function levelPrices(uint8) view returns (uint256)"
        ];

        const USDT_ABI = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)",
            "function balanceOf(address) view returns (uint256)"
        ];

        let provider, signer, contract, usdt, userAddr;

        async function connect() {
            if (!window.ethereum) return alert("Open in MetaMask Browser!");
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddr = accounts[0];
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                
                contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
                usdt = new ethers.Contract(USDT_ADDR, USDT_ABI, signer);
                
                document.getElementById('connectBtn').innerText = userAddr.slice(0,6) + "...";
                await loadData(userAddr);
            } catch (e) { alert("Error: " + e.message); }
        }

        async function loadData(addr) {
            try {
                const [user, owner, bal] = await Promise.all([
                    contract.users(addr),
                    contract.owner(),
                    usdt.balanceOf(addr)
                ]);

                const isFounder = addr.toLowerCase() === MY_WALLET.toLowerCase() || addr.toLowerCase() === owner.toLowerCase();

                // Обновляем текст
                document.getElementById('u-id').innerText = isFounder ? "1 (SPARTAN)" : (user.id == 0n ? "NOT REG" : user.id.toString());
                document.getElementById('u-level').innerText = isFounder ? "15 (MAX)" : user.activeLevel.toString();
                document.getElementById('u-refs').innerText = user.personalReferralsCount.toString();
                document.getElementById('u-bal').innerText = Number(ethers.formatUnits(bal, 6)).toFixed(2);

                // Показываем скрытые элементы (Кнопка и панель)
                document.getElementById('refLinkBox').classList.remove('hidden');
                if (isFounder) document.getElementById('founderPanel').classList.remove('hidden');

                // Авто-реферер
                const urlParams = new URLSearchParams(window.location.search);
                if(urlParams.has('ref')) document.getElementById('refInput').value = urlParams.get('ref');

            } catch (e) { console.error("Load error:", e); }
        }

        function copyRefLink() {
            if (!userAddr) return alert("Connect Wallet!");
            const link = window.location.origin + window.location.pathname + "?ref=" + userAddr;
            
            // Фикс для мобильного копирования
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copied!");
        }

        async function register() {
            try {
                const ref = document.getElementById('refInput').value.trim();
                const amount = ethers.parseUnits("10", 6);
                const allowance = await usdt.allowance(userAddr, CONTRACT_ADDR);
                if (allowance < amount) {
                    const tx = await usdt.approve(CONTRACT_ADDR, ethers.MaxUint256);
                    await tx.wait();
                }
                const tx = await contract.register(ref);
                await tx.wait(); alert("Welcome!");
                loadData(userAddr);
            } catch (e) { alert(e.reason || "Check Balance/Approve"); }
        }

        async function buyLevel() {
            try {
                const user = await contract.users(userAddr);
                const nxt = Number(user.activeLevel) + 1;
                const prc = await contract.levelPrices(nxt);
                const allowance = await usdt.allowance(userAddr, CONTRACT_ADDR);
                if (allowance < prc) {
                    const tx = await usdt.approve(CONTRACT_ADDR, ethers.MaxUint256);
                    await tx.wait();
                }
                const tx = await contract.buyLevel(nxt);
                await tx.wait(); alert("Level Up!");
                loadData(userAddr);
            } catch (e) { alert(e.reason || "Error"); }
        }

        function changeLang(l) { /* Упрощенная логика для теста */ 
            const d = {ru: {id:"ID", lvl:"Уровень", cp:"Копировать"}, en: {id:"ID", lvl:"Level", cp:"Copy"}};
            document.getElementById('t-id').innerText = d[l].id;
            document.getElementById('t-copy').innerText = d[l].cp;
        }
    </script>
</body>
</html>
